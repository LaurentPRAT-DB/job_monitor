# E2 Workspace (DEFAULT profile)
# Deploy: ./deploy.sh e2
# App URL: https://job-monitor-1444828305810485.aws.databricksapps.com

bundle:
  name: job-monitor

sync:
  include:
    - job_monitor/ui/dist/**
    - job_monitor/jobs/**
    - job_monitor/config.yaml

variables:
  warehouse_id:
    description: "SQL warehouse ID (fe-lens)"
    default: "06c1adfd3dbdacde"
  cache_catalog:
    default: "job_monitor"
  cache_schema:
    default: "cache"
  cache_refresh_cron:
    default: "0 */15 * * * ?"

targets:
  e2:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
      host: https://e2-demo-field-eng.cloud.databricks.com

resources:
  apps:
    job-monitor:
      name: job-monitor
      description: "Databricks Job Monitoring Framework"
      source_code_path: .

  jobs:
    refresh-metrics-cache:
      name: "job-monitor-refresh-cache"
      description: "Refresh metrics cache tables for fast dashboard loading"
      tasks:
        - task_key: refresh_cache
          spark_python_task:
            python_file: job_monitor/jobs/refresh_metrics_cache.py
            parameters:
              - "--catalog"
              - "${var.cache_catalog}"
              - "--schema"
              - "${var.cache_schema}"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              "spark.master": "local[*]"
              "spark.databricks.cluster.profile": "singleNode"
            custom_tags:
              "ResourceClass": "SingleNode"
            data_security_mode: "SINGLE_USER"
          libraries:
            - pypi:
                package: "pyyaml"
      schedule:
        quartz_cron_expression: "${var.cache_refresh_cron}"
        timezone_id: "UTC"
      tags:
        project: "job-monitor"
        purpose: "cache-refresh"
