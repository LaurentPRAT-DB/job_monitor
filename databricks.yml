bundle:
  name: job-monitor

# Configuration is centralized in job_monitor/config.yaml
# Both the app and the cache refresh job read from this file.
# Variables below can override config.yaml values per target.

sync:
  include:
    - job_monitor/ui/dist/**
    - job_monitor/jobs/**
    - job_monitor/config.yaml

variables:
  warehouse_id:
    description: "SQL warehouse ID for system table queries"
    default: "06c1adfd3dbdacde"
  # These override config.yaml if set. Leave empty to use config.yaml values.
  cache_catalog:
    description: "Catalog for metrics cache tables (overrides config.yaml)"
    default: ""
  cache_schema:
    description: "Schema for metrics cache tables (overrides config.yaml)"
    default: ""
  cache_refresh_cron:
    description: "Cron schedule for cache refresh (overrides config.yaml)"
    default: "0 */15 * * * ?"

targets:
  # E2 is the main deployment (OBO works here)
  e2:
    mode: development
    default: true
    workspace:
      profile: DEFAULT
      host: https://e2-demo-field-eng.cloud.databricks.com
    variables:
      warehouse_id: "06c1adfd3dbdacde"
      cache_catalog: "job_monitor"
      cache_schema: "cache"

  # Dev workspace (Free Edition - OBO not supported, uses mock data)
  dev:
    mode: development
    workspace:
      profile: LPT_FREE_EDITION
    variables:
      warehouse_id: "58d41113cb262dce"
      cache_catalog: "job_monitor"
      cache_schema: "cache"

resources:
  apps:
    job-monitor:
      name: job-monitor
      description: "Databricks Job Monitoring Framework"
      source_code_path: .

  jobs:
    refresh-metrics-cache:
      name: "job-monitor-refresh-cache"
      description: "Refresh metrics cache tables for fast dashboard loading"
      tasks:
        - task_key: refresh_cache
          spark_python_task:
            python_file: job_monitor/jobs/refresh_metrics_cache.py
            parameters:
              - "--catalog"
              - "job_monitor"
              - "--schema"
              - "cache"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
            data_security_mode: "SINGLE_USER"
      schedule:
        quartz_cron_expression: "${var.cache_refresh_cron}"
        timezone_id: "UTC"
      tags:
        project: "job-monitor"
        purpose: "cache-refresh"
