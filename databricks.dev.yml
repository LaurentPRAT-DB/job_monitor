# Dev Workspace (LPT_FREE_EDITION profile) - Development/Testing
# Deploy: ./deploy.sh dev
# App URL: https://job-monitor-3704140105640043.aws.databricksapps.com
# Note: Free Edition - OBO not supported, uses mock data

bundle:
  name: job-monitor

sync:
  include:
    - job_monitor/ui/dist/**
    - job_monitor/jobs/**
    - job_monitor/config.yaml

variables:
  warehouse_id:
    description: "SQL warehouse ID for dev workspace"
    default: "58d41113cb262dce"
  cache_catalog:
    default: "job_monitor"
  cache_schema:
    default: "cache"
  cache_refresh_cron:
    default: "0 */15 * * * ?"

targets:
  dev:
    mode: development
    default: true
    workspace:
      profile: LPT_FREE_EDITION

resources:
  apps:
    job-monitor:
      name: job-monitor
      description: "Databricks Job Monitoring Framework"
      source_code_path: .

  # Jobs disabled in dev workspace (Free Edition only supports serverless)
  # Cache refresh job only available in e2/prod targets
