command:
  - uvicorn
  - job_monitor.backend.app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  - name: DATABRICKS_HOST
    valueFrom: workspace-host
  - name: WAREHOUSE_ID
    description: "SQL warehouse ID for system table queries"
    value: "58d41113cb262dce"
  - name: LOG_LEVEL
    description: "Logging level for debugging"
    value: "DEBUG"

permissions:
  - user_name: "${DATABRICKS_USER}"
    level: CAN_MANAGE

resources:
  - name: oauth
    oauth:
      scopes:
        - sql:*
        - compute.clusters:read
