command:
  - uvicorn
  - job_monitor.backend.app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  - name: DATABRICKS_HOST
    valueFrom: workspace-host
  - name: WAREHOUSE_ID
    description: "SQL warehouse ID for system table queries (E2 fe-lens warehouse)"
    value: "06c1adfd3dbdacde"
  - name: LOG_LEVEL
    description: "Logging level for debugging"
    value: "DEBUG"
  # Cache settings are loaded from job_monitor/config.yaml
  # Set env vars below to override config.yaml values:
  # - CACHE_CATALOG: Catalog name for cache tables
  # - CACHE_SCHEMA: Schema name for cache tables
  # - USE_CACHE: Set to "false" to bypass cache

permissions:
  - user_name: "${DATABRICKS_USER}"
    level: CAN_MANAGE

# User OBO (On-Behalf-Of) scopes - enables user token forwarding
# CRITICAL: "sql" scope allows app to use user's permissions for system table queries
# Must also set via CLI: databricks apps update <name> --json '{"user_api_scopes": ["sql"]}'
user_api_scopes:
  - sql
