# Job Monitor Configuration
# This file is the single source of truth for both the app and the cache refresh job.
# Values can be overridden by environment variables (uppercase, e.g., CACHE_CATALOG).

# Mock data settings (for development/demos without system table access)
mock_data:
  # Enable mock data mode (for development only - disables real data queries)
  # Override with USE_MOCK_DATA=true environment variable
  enabled: false
  # Auto-fallback: use mock data when system table queries fail due to permissions
  # This allows demos to work while showing real data when available
  auto_fallback: true

# Cache settings for pre-aggregated metrics
cache:
  catalog: "job_monitor"
  schema: "cache"
  # Refresh schedule in cron format (used by the Databricks job)
  # Examples: "0 */10 * * * ?" (every 10 min), "0 */15 * * * ?" (every 15 min), "0 0 * * * ?" (hourly)
  refresh_cron: "0 */10 * * * ?"
  # Enable cache-first queries (set to false to bypass cache)
  enabled: true

# SQL Warehouse for queries
warehouse_id: ""

# DBU rate for cost calculations (0 = disabled)
dbu_rate: 0.0

# Job tag keys for attribution
tags:
  sla: "sla_minutes"
  team: "team"
  owner: "owner"
  budget: "budget_monthly_dbus"
