command:
  - uvicorn
  - job_monitor.backend.app:app
  - --host
  - "0.0.0.0"
  - --port
  - "8000"

env:
  - name: DATABRICKS_HOST
    valueFrom: workspace-host
  - name: WAREHOUSE_ID
    description: "SQL warehouse ID for system table queries (DEMO WEST)"
    value: "75fd8278393d07eb"  # DEMO WEST Shared Endpoint
  - name: LOG_LEVEL
    description: "Logging level for debugging"
    value: "INFO"
  - name: CACHE_CATALOG
    description: "Catalog for cache tables and filter presets"
    value: "job_monitor"
  - name: CACHE_SCHEMA
    description: "Schema for cache tables and filter presets"
    value: "cache"

permissions:
  - user_name: "${DATABRICKS_USER}"
    level: CAN_MANAGE

# User OBO (On-Behalf-Of) scopes - enables user token forwarding
# CRITICAL: "sql" scope allows app to use user's permissions for system table queries
# Must also set via CLI: databricks apps update <name> --json '{"user_api_scopes": ["sql"]}'
user_api_scopes:
  - sql
