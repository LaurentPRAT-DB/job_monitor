# DEMO WEST Workspace (DEMO WEST profile) - Production
# Deploy: ./deploy.sh prod
# App URL: https://job-monitor-2556758628403379.aws.databricksapps.com

bundle:
  name: job-monitor

sync:
  include:
    - job_monitor/ui/dist/**
    - job_monitor/jobs/**
    - job_monitor/config.yaml

variables:
  warehouse_id:
    description: "SQL warehouse ID for DEMO WEST"
    default: "06c1adfd3dbdacde"  # TODO: Update with DEMO WEST warehouse ID
  cache_catalog:
    default: "job_monitor"
  cache_schema:
    default: "cache"
  cache_refresh_cron:
    default: "0 */15 * * * ?"

targets:
  prod:
    mode: development
    default: true
    workspace:
      profile: "DEMO WEST"
      host: https://e2-demo-west.cloud.databricks.com

resources:
  apps:
    job-monitor:
      name: job-monitor
      description: "Databricks Job Monitoring Framework"
      source_code_path: .

  jobs:
    refresh-metrics-cache:
      name: "job-monitor-refresh-cache"
      description: "Refresh metrics cache tables for fast dashboard loading"
      tasks:
        - task_key: refresh_cache
          spark_python_task:
            python_file: job_monitor/jobs/refresh_metrics_cache.py
            parameters:
              - "--catalog"
              - "${var.cache_catalog}"
              - "--schema"
              - "${var.cache_schema}"
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
            data_security_mode: "SINGLE_USER"
      schedule:
        quartz_cron_expression: "${var.cache_refresh_cron}"
        timezone_id: "UTC"
      tags:
        project: "job-monitor"
        purpose: "cache-refresh"
